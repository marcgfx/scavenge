<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Cham Mini Scavenger Hunt</title>
<style>
  body { font-family: system-ui, sans-serif; margin:0; background:#f6f2e8; color:#222; }
  main { max-width:680px; margin:auto; padding:22px; }
  .card { background:white; border-radius:18px; padding:20px; box-shadow:0 8px 25px #0002; }
  button { border:0; border-radius:12px; padding:12px 16px; font-weight:700; cursor:pointer; }
  .primary { background:#2f7d52; color:white; }
  .ghost { background:#eee; }
  .ok { color:#2f7d52; font-weight:700; }
  .bad { color:#b23b3b; font-weight:700; }
  .small { color:#666; font-size:14px; }
</style>
</head>
<body>
<main>
  <h1>🕵️ Cham Treasure Trail</h1>
  <div class="card">
    <h2 id="title"></h2>
    <p id="clue"></p>
    <p><b>Mission:</b> <span id="task"></span></p>
    <p id="status" class="small"></p>
    <button class="primary" onclick="checkLocation()">I’m here — verify GPS</button>
    <button class="ghost" onclick="manualHint()">Need a hint?</button>
    <p class="small">GPS works best outdoors. You must be within about <b>90m</b>.</p>
  </div>
</main>

<script>
const stops = [
  {
    title: "Stop 1: The Green Giant",
    clue: "Find the beautiful park near the lake where old trees guard the view.",
    task: "Go to Villettepark and take a funny tree-selfie.",
    hint: "Look south of Cham station, toward the lake.",
    lat: 47.1776, lon: 8.4587
  },
  {
    title: "Stop 2: Lake Breeze Base",
    clue: "Find the lakeside place where Cham relaxes by the water.",
    task: "Go to Hirsgarten and spot something floating, swimming, or sailing.",
    hint: "Stay near the lake path east of Villettepark.",
    lat: 47.1789, lon: 8.4622
  },
  {
    title: "Stop 3: Castle Watch",
    clue: "A castle watches the lake from a little peninsula.",
    task: "Reach the public path near Schloss St. Andreas. Do not enter private areas.",
    hint: "Continue east along the lakeside toward the castle area.",
    lat: 47.17875, lon: 8.46625
  }
];

let current = Number(localStorage.huntStop || 0);

function render() {
  if (current >= stops.length) {
    document.querySelector(".card").innerHTML =
      "<h2>🎉 Treasure found!</h2><p>You completed the Cham scavenger hunt.</p><p class='ok'>Final challenge: celebrate with ice cream or a lake photo.</p><button onclick='resetHunt()'>Play again</button>";
    return;
  }
  const s = stops[current];
  title.textContent = s.title;
  clue.textContent = s.clue;
  task.textContent = s.task;
  status.textContent = `Progress: ${current + 1} / ${stops.length}`;
}

function checkLocation() {
  const s = stops[current];
  status.textContent = "Checking your location…";

  if (!navigator.geolocation) {
    status.innerHTML = "<span class='bad'>GPS is not supported on this device.</span>";
    return;
  }

  navigator.geolocation.getCurrentPosition(pos => {
    const d = distanceMeters(
      pos.coords.latitude, pos.coords.longitude,
      s.lat, s.lon
    );

    if (d <= 90) {
      current++;
      localStorage.huntStop = current;
      status.innerHTML = `<span class='ok'>Verified! You were ${Math.round(d)}m away.</span>`;
      setTimeout(render, 900);
    } else {
      status.innerHTML = `<span class='bad'>Not quite! You are about ${Math.round(d)}m away.</span>`;
    }
  }, err => {
    status.innerHTML = "<span class='bad'>Location blocked or unavailable. Enable location access and try again.</span>";
  }, {
    enableHighAccuracy: true,
    timeout: 10000,
    maximumAge: 0
  });
}

function distanceMeters(lat1, lon1, lat2, lon2) {
  const R = 6371000;
  const toRad = x => x * Math.PI / 180;
  const dLat = toRad(lat2-lat1), dLon = toRad(lon2-lon1);
  const a = Math.sin(dLat/2)**2 +
    Math.cos(toRad(lat1)) * Math.cos(toRad(lat2)) *
    Math.sin(dLon/2)**2;
  return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
}

function manualHint() {
  alert(stops[current].hint);
}

function resetHunt() {
  localStorage.removeItem("huntStop");
  current = 0;
  render();
}

render();
</script>
</body>
</html>

<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Scavenger Hunts</title>

  <style>
    body{
      margin:0;
      font-family:system-ui,sans-serif;
      background:#f4f1e8;
      color:#222;
      display:flex;
      align-items:center;
      justify-content:center;
      min-height:100vh;
    }

    .card{
      background:white;
      padding:32px;
      border-radius:20px;
      box-shadow:0 10px 30px rgba(0,0,0,.12);
      text-align:center;
      max-width:420px;
    }

    h1{
      margin-top:0;
    }

    a.button{
      display:inline-block;
      margin-top:18px;
      padding:14px 20px;
      border-radius:14px;
      background:#2f7d52;
      color:white;
      text-decoration:none;
      font-weight:700;
      transition:.15s transform ease;
    }

    a.button:hover{
      transform:scale(1.04);
    }

    p{
      color:#555;
    }
  </style>
</head>
<body>

  <div class="card">
    <h1>🕵️ Scavenger Hunts</h1>

    <p>
      Explore fun location-based treasure hunts.
    </p>

    <a class="button" href="cham.html">
      Start Cham Hunt
    </a>
  </div>

</body>
</html>
